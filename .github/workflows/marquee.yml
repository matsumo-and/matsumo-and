name: Generate Contribution LED Marquee

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch: # Manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Pick random text
        id: random
        run: |
          texts=(
            "Welcome!"
            "Hello World!"
            "Hi There!"
            "Keep Coding!"
            "Let's Go!"
          )
          index=$((RANDOM % ${#texts[@]}))
          selected=${texts[$index]}
          echo "text=$selected" >> $GITHUB_OUTPUT

      - name: Set filepath
        id: date
        run: |
          date=$(date +"%Y%m%d%H%M%S")
          echo "path=assets/marquee_$date.svg" >> $GITHUB_OUTPUT

      - name: Generate Marquee
        uses: matsumo-and/contribution-led-marquee@v1.0.2
        with:
          github_user_name: ${{ github.repository_owner }}
          text: ${{ steps.random.outputs.text }}
          show_contributions: true
          cell_size: '10'
          cell_gap: '2'
          scroll_speed: '8'
          initial_delay: '3'
          output_path: ${{ steps.date.outputs.path }}

      - name: Update README
        run: |
          sed -i "s|assets/marquee[^)]*\.svg|${{ steps.date.outputs.path }}|g" README.md

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ${{ steps.date.outputs.path }} README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update marquee"
          git push
