name: Generate Contribution LED Marquee

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch: # Manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Marquee
        uses: matsumo-and/contribution-led-marquee@v1.0.0
        with:
          github_user_name: ${{ github.repository_owner }}
          text: 'Welcome to visit!'
          show_contributions: true
          cell_size: '10'
          cell_gap: '2'
          scroll_speed: '8'
          initial_delay: '3'
          output_path: 'assets/marquee.svg'

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/marquee.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "Update marquee"
          git push
